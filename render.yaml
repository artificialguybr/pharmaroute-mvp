services:
  - type: web
    name: pharmaroute-mvp-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: LOG_LEVEL
        value: info
      - key: REQUEST_TIMEOUT_MS
        value: 15000
      - key: API_RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: API_RATE_LIMIT_MAX
        value: 500
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
